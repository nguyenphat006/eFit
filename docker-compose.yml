version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: efit_postgres
    restart: always
    environment:
      POSTGRES_USER: efit_user
      POSTGRES_PASSWORD: efit_password
      POSTGRES_DB: efit_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U efit_user -d efit_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: efit_backend
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/.venv
    environment:
      - DATABASE_URL=postgresql+asyncpg://efit_user:efit_password@db:5432/efit_db
      - ENV=development
      - WATCHFILES_FORCE_POLLING=true
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: efit_frontend
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend

volumes:
  postgres_data:
